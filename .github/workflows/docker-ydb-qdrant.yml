name: Build and publish ydb-qdrant Docker image to GHCR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v9.0.0"
        required: true
      publish_latest:
        description: "Also update the latest image tags"
        required: false
        type: boolean
        default: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || format('refs/tags/{0}', inputs.tag) }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version and image tags
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          PUBLISH_LATEST: ${{ inputs.publish_latest }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          if [ "${EVENT_NAME}" = "release" ]; then
            TAG="${RELEASE_TAG}"
          else
            TAG="${INPUT_TAG}"
          fi
          case "${TAG}" in
            v[0-9]*.[0-9]*.[0-9]*|ydb-qdrant-v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Unsupported release tag format: ${TAG}" >&2
              exit 1
              ;;
          esac
          VERSION="${TAG#ydb-qdrant-v}"
          VERSION="${VERSION#v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+[.][0-9]+[.][0-9]+([-_.][0-9A-Za-z_.-]+)?$ ]]; then
            echo "Unsupported Docker version tag: ${VERSION}" >&2
            exit 1
          fi
          if [ "${EVENT_NAME}" = "release" ] || [ "${PUBLISH_LATEST}" = "true" ]; then
            SHOULD_PUBLISH_LATEST="true"
          else
            SHOULD_PUBLISH_LATEST="false"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          {
            echo "ydb_qdrant_tags<<EOF"
            echo "ghcr.io/${REPOSITORY_OWNER}/ydb-qdrant:${VERSION}"
            if [ "${SHOULD_PUBLISH_LATEST}" = "true" ]; then
              echo "ghcr.io/${REPOSITORY_OWNER}/ydb-qdrant:latest"
            fi
            echo "EOF"
            echo "ydb_qdrant_local_tags<<EOF"
            echo "ghcr.io/${REPOSITORY_OWNER}/ydb-qdrant-local:${VERSION}"
            if [ "${SHOULD_PUBLISH_LATEST}" = "true" ]; then
              echo "ghcr.io/${REPOSITORY_OWNER}/ydb-qdrant-local:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ydb-qdrant image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.version.outputs.ydb_qdrant_tags }}

      - name: Build and push ydb-qdrant-local image (with embedded YDB)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          file: Dockerfile.local-ydb
          tags: ${{ steps.version.outputs.ydb_qdrant_local_tags }}
